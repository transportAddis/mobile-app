name: mobile_app
description: Smart Transit Addis – Journey planning and live queue/occupancy tracking for Addis Ababa.
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '^3.12.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ── State Management ──────────────────────────────────────────────────────
  provider: ^6.1.2

  # ── Networking ────────────────────────────────────────────────────────────
  http: ^1.2.1

  # ── Maps (OpenStreetMap) ──────────────────────────────────────────────────
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

  # ── Fonts & Vector Assets ─────────────────────────────────────────────────
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1

  # ── Local Storage ─────────────────────────────────────────────────────────
  shared_preferences: ^2.2.3
  geolocator: ^14.0.3

  intl: any
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: true
